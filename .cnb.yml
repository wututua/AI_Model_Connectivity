# 公共构建配置
.go-env: &go-env
  docker:
    image: golang:1.25
    volumes:
      - go-modules

# 构建脚本模板
.build-stages: &build-stages
  - name: test
    script: go test ./...
    timeout: 10m
  - name: build
    script: |
      mkdir -p dist
      go build -trimpath -ldflags="-s -w" -o "dist/$BINARY" ./cmd/cg
  - name: package
    script: |
      cd dist
      ASSET_NAME="${BINARY%.exe}"
      cp ../.env.example .env.example
      cp ../README.md README.md
      if [ "$GOOS" = "windows" ]; then
        zip "${ASSET_NAME}.zip" "$BINARY" ".env.example" "README.md"
      else
        tar -czf "${ASSET_NAME}.tar.gz" "$BINARY" ".env.example" "README.md"
      fi
      echo "##[set-output ARTIFACT=${ASSET_NAME}]"
    exports:
      ARTIFACT: ARTIFACT

# 发布 Release 脚本模板
.release-stages: &release-stages
  - name: collect-artifacts
    script: |
      mkdir -p release-assets
      for dir in /workspace/build-*/dist; do
        if [ -d "$dir" ]; then
          cp "$dir"/*.tar.gz "$dir"/*.zip release-assets/ 2>/dev/null || true
        fi
      done
      ls -la release-assets/ || echo "No artifacts found in build dirs"
  - name: publish-release
    type: git:release
    options:
      tag: $CNB_BRANCH
      description: |
        ## Release 说明

        - 下载对应平台的压缩包
        - 解压后可直接使用，其中包含二进制、`.env.example` 和 `README.md`
        - 复制 `.env.example` 为 `.env`，填写至少一个 Provider 后启动程序
        - 该项目会真实调用模型接口并消耗 token，建议把自动检测周期调长一点

        ## 启动方式

        - 二进制包：直接运行 `model-connectivity` 或 `model-connectivity.exe`
        - 源码运行：`go run ./cmd/cg`

# tag_push / tag_deploy 触发编译发版
$:
  tag_push:
    build-linux-amd64:
      <<: *go-env
      name: build-linux-amd64
      env:
        GOOS: linux
        GOARCH: amd64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-linux-amd64
      stages: *build-stages

    build-linux-arm64:
      <<: *go-env
      name: build-linux-arm64
      env:
        GOOS: linux
        GOARCH: arm64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-linux-arm64
      stages: *build-stages

    build-windows-amd64:
      <<: *go-env
      name: build-windows-amd64
      env:
        GOOS: windows
        GOARCH: amd64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-windows-amd64.exe
      stages: *build-stages

    build-windows-arm64:
      <<: *go-env
      name: build-windows-arm64
      env:
        GOOS: windows
        GOARCH: arm64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-windows-arm64.exe
      stages: *build-stages

    build-darwin-amd64:
      <<: *go-env
      name: build-darwin-amd64
      env:
        GOOS: darwin
        GOARCH: amd64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-darwin-amd64
      stages: *build-stages

    build-darwin-arm64:
      <<: *go-env
      name: build-darwin-arm64
      env:
        GOOS: darwin
        GOARCH: arm64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-darwin-arm64
      stages: *build-stages

    release:
      <<: *go-env
      name: release
      stages: *release-stages

  tag_deploy.release:
    build-linux-amd64:
      <<: *go-env
      name: build-linux-amd64
      env:
        GOOS: linux
        GOARCH: amd64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-linux-amd64
      stages: *build-stages

    build-linux-arm64:
      <<: *go-env
      name: build-linux-arm64
      env:
        GOOS: linux
        GOARCH: arm64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-linux-arm64
      stages: *build-stages

    build-windows-amd64:
      <<: *go-env
      name: build-windows-amd64
      env:
        GOOS: windows
        GOARCH: amd64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-windows-amd64.exe
      stages: *build-stages

    build-windows-arm64:
      <<: *go-env
      name: build-windows-arm64
      env:
        GOOS: windows
        GOARCH: arm64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-windows-arm64.exe
      stages: *build-stages

    build-darwin-amd64:
      <<: *go-env
      name: build-darwin-amd64
      env:
        GOOS: darwin
        GOARCH: amd64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-darwin-amd64
      stages: *build-stages

    build-darwin-arm64:
      <<: *go-env
      name: build-darwin-arm64
      env:
        GOOS: darwin
        GOARCH: arm64
        CGO_ENABLED: "0"
        BINARY: model-connectivity-darwin-arm64
      stages: *build-stages

    release:
      <<: *go-env
      name: release
      stages: *release-stages
