# 公共Go环境配置
.go-env: &go-env
  docker:
    image: golang:1.25
    volumes:
      - go-modules
      - go-build
  env:
    GOMODCACHE: /go/pkg/mod
    GOCACHE: /go/pkg/build
    CGO_ENABLED: "0"

# 前端构建任务配置
.frontend-job: &frontend-job
  docker:
    image: node:20-slim
  name: build-frontend
  stages:
    - name: build
      script: |
        cd frontend
        npm ci
        npm run build

# 公共测试阶段（仅执行一次）
.test-stages: &test-stages
  - name: test
    script: go test -v ./...
    timeout: 10m

# 公共构建阶段（已移除测试，避免跨平台执行）
.build-stages: &build-stages
  - name: build
    script: |
      mkdir -p dist
      go build -trimpath -ldflags="-s -w -X main.version=$CNB_BRANCH -X main.commit=$CNB_COMMIT_SHA" -o "dist/$BINARY" ./cmd/cg
  - name: package
    script: |
      cd dist
      ASSET_NAME="${BINARY%.exe}"
      cp ../.env.example .env.example
      cp ../README.md README.md
      WEB_SRC="/yyds/build-frontend/workspace/web"
      [ -d "$WEB_SRC" ] && cp -r "$WEB_SRC" ./web || cp -r ../web ./web
      tar -czf "${ASSET_NAME}.tar.gz" "$BINARY" ".env.example" "README.md" "web/"
      echo "##[set-output ARTIFACT=${ASSET_NAME}]"
    exports:
      ARTIFACT: ARTIFACT

# Windows专属构建阶段（解决zip工具缺失问题）
.windows-build-stages: &windows-build-stages
  - name: install-deps
    script: |
      apt-get update && apt-get install -y --no-install-recommends zip
  - name: build
    script: |
      mkdir -p dist
      go build -trimpath -ldflags="-s -w -X main.version=$CNB_BRANCH -X main.commit=$CNB_COMMIT_SHA" -o "dist/$BINARY" ./cmd/cg
  - name: package
    script: |
      cd dist
      ASSET_NAME="${BINARY%.exe}"
      cp ../.env.example .env.example
      cp ../README.md README.md
      WEB_SRC="/yyds/build-frontend/workspace/web"
      [ -d "$WEB_SRC" ] && cp -r "$WEB_SRC" ./web || cp -r ../web ./web
      zip -r "${ASSET_NAME}.zip" "$BINARY" ".env.example" "README.md" "web/"
      echo "##[set-output ARTIFACT=${ASSET_NAME}]"
    exports:
      ARTIFACT: ARTIFACT

# 发布Release脚本模板（已修正路径）
.release-stages: &release-stages
  - name: collect-artifacts
    script: |
      mkdir -p release-assets
      for dir in /yyds/*/workspace/dist; do
        if [ -d "$dir" ]; then
          cp "$dir"/*.tar.gz "$dir"/*.zip release-assets/ 2>/dev/null || true
        fi
      done
      ls -la release-assets/ || echo "No artifacts found in build dirs"
  - name: publish-release
    type: git:release
    options:
      tag: $CNB_BRANCH
      description: |
        ## Release 说明

        - 下载对应平台的压缩包
        - 解压后可直接使用，其中包含二进制、`.env.example`、`README.md` 和预构建的 `web/` 目录
        - 复制 `.env.example` 为 `.env`，填写至少一个 Provider 后启动程序
        - 该项目会真实调用模型接口并消耗 token，建议把自动检测周期调长一点

        ## 版本信息
        - 版本号: $CNB_BRANCH
        - 提交哈希: $CNB_COMMIT_SHA

        ## 启动方式

        - 二进制包：直接运行 `model-connectivity` 或 `model-connectivity.exe`
        - 源码运行：`go run ./cmd/cg`

# tag_push 触发编译发版
$:
  tag_push:
    test:
      <<: *go-env
      name: run-unit-tests
      stages: *test-stages

    build-frontend:
      <<: *frontend-job

    build-linux-amd64:
      <<: *go-env
      name: build-linux-amd64
      env:
        GOOS: linux
        GOARCH: amd64
        BINARY: model-connectivity-linux-amd64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    build-linux-arm64:
      <<: *go-env
      name: build-linux-arm64
      env:
        GOOS: linux
        GOARCH: arm64
        BINARY: model-connectivity-linux-arm64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    build-windows-amd64:
      <<: *go-env
      name: build-windows-amd64
      env:
        GOOS: windows
        GOARCH: amd64
        BINARY: model-connectivity-windows-amd64.exe
      stages: *windows-build-stages
      needs:
        - test
        - build-frontend

    build-windows-arm64:
      <<: *go-env
      name: build-windows-arm64
      env:
        GOOS: windows
        GOARCH: arm64
        BINARY: model-connectivity-windows-arm64.exe
      stages: *windows-build-stages
      needs:
        - test
        - build-frontend

    build-darwin-amd64:
      <<: *go-env
      name: build-darwin-amd64
      env:
        GOOS: darwin
        GOARCH: amd64
        BINARY: model-connectivity-darwin-amd64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    build-darwin-arm64:
      <<: *go-env
      name: build-darwin-arm64
      env:
        GOOS: darwin
        GOARCH: arm64
        BINARY: model-connectivity-darwin-arm64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    release:
      <<: *go-env
      name: release
      stages: *release-stages
      needs:
        - build-linux-amd64
        - build-linux-arm64
        - build-windows-amd64
        - build-windows-arm64
        - build-darwin-amd64
        - build-darwin-arm64

  # tag_deploy.release 触发编译发版（与tag_push完全一致）
  tag_deploy.release:
    test:
      <<: *go-env
      name: run-unit-tests
      stages: *test-stages

    build-frontend:
      <<: *frontend-job

    build-linux-amd64:
      <<: *go-env
      name: build-linux-amd64
      env:
        GOOS: linux
        GOARCH: amd64
        BINARY: model-connectivity-linux-amd64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    build-linux-arm64:
      <<: *go-env
      name: build-linux-arm64
      env:
        GOOS: linux
        GOARCH: arm64
        BINARY: model-connectivity-linux-arm64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    build-windows-amd64:
      <<: *go-env
      name: build-windows-amd64
      env:
        GOOS: windows
        GOARCH: amd64
        BINARY: model-connectivity-windows-amd64.exe
      stages: *windows-build-stages
      needs:
        - test
        - build-frontend

    build-windows-arm64:
      <<: *go-env
      name: build-windows-arm64
      env:
        GOOS: windows
        GOARCH: arm64
        BINARY: model-connectivity-windows-arm64.exe
      stages: *windows-build-stages
      needs:
        - test
        - build-frontend

    build-darwin-amd64:
      <<: *go-env
      name: build-darwin-amd64
      env:
        GOOS: darwin
        GOARCH: amd64
        BINARY: model-connectivity-darwin-amd64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    build-darwin-arm64:
      <<: *go-env
      name: build-darwin-arm64
      env:
        GOOS: darwin
        GOARCH: arm64
        BINARY: model-connectivity-darwin-arm64
      stages: *build-stages
      needs:
        - test
        - build-frontend

    release:
      <<: *go-env
      name: release
      stages: *release-stages
      needs:
        - build-linux-amd64
        - build-linux-arm64
        - build-windows-amd64
        - build-windows-arm64
        - build-darwin-amd64
        - build-darwin-arm64
