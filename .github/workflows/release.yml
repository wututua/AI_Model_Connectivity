name: Build release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build
        run: npm run build --prefix frontend

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          binary="model-connectivity-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" ./cmd/cg

      - name: Package
        run: |
          cd dist
          asset="model-connectivity-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp ../.env.example .env.example
          cp ../README.md README.md
          cp -r ../web web
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${asset}.zip" "${asset}.exe" ".env.example" "README.md" "web/"
          else
            tar -czf "${asset}.tar.gz" "${asset}" ".env.example" "README.md" "web/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-connectivity-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: 'model-connectivity-*'
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Release 说明

            - 下载对应平台的压缩包
            - 解压后可直接使用，其中包含二进制、`.env.example`、`README.md` 和预构建的 `web/` 目录
            - 复制 `.env.example` 为 `.env`，填写至少一个 Provider 后启动程序
            - 该项目会真实调用模型接口并消耗 token，建议把自动检测周期调长一点

            ## 启动方式

            - 二进制包：直接运行 `model-connectivity` 或 `model-connectivity.exe`
            - 源码运行：`go run ./cmd/cg`
            - Docker：`docker compose up -d`
          files: |
            dist/*.zip
            dist/*.tar.gz

  docker:
    name: Push Docker image to Docker Hub
    needs: build-frontend
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/model-connectivity
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
