name: Build release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          binary="model-connectivity-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" ./cmd/cg

      - name: Package
        run: |
          cd dist
          asset="model-connectivity-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp ../.env.example .env.example
          cp ../README.md README.md
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${asset}.zip" "${asset}.exe" ".env.example" "README.md"
          else
            tar -czf "${asset}.tar.gz" "${asset}" ".env.example" "README.md"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-connectivity-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Release 说明

            - 下载对应平台的压缩包
            - 解压后可直接使用，其中包含二进制、`.env.example` 和 `README.md`
            - 复制 `.env.example` 为 `.env`，填写至少一个 Provider 后启动程序

            ## 启动方式

            - 二进制包：直接运行 `model-connectivity` 或 `model-connectivity.exe`
            - 源码运行：`go run ./cmd/cg`
          files: |
            dist/*.zip
            dist/*.tar.gz
