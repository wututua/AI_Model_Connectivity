name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: ["**"]

jobs:
  test-backend:
    name: Go test & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v -race ./...

  test-frontend:
    name: TypeScript check (${{ matrix.theme }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        theme: [default, argon]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/themes/${{ matrix.theme }}/package-lock.json

      - name: Install dependencies
        working-directory: frontend/themes/${{ matrix.theme }}
        run: npm ci

      - name: TypeScript check
        working-directory: frontend/themes/${{ matrix.theme }}
        run: npx tsc --noEmit
