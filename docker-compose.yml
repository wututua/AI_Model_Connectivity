services:
  model-connectivity:
    build: .
    # 或者直接使用预构建镜像（如果已推送到镜像仓库）：
    # image: ghcr.io/wututua/ai_model_connectivity:latest
    container_name: model-connectivity
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data      # SQLite 数据库持久化
    env_file:
      - .env
    environment:
      # 容器内必须监听 0.0.0.0 才能接收外部流量
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
